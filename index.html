<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QR Stock POP/POS - อีเว้นท์ราชบุรี</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel2:#1e222b;
    --border:#2a2f3a;
    --text:#eef1f6;
    --sub:#9aa3b2;
    --accent:#3ddc97;
    --accent2:#2bb883;
    --danger:#ff5d6c;
    --warn:#f5a623;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Sarabun',sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-tap-highlight-color:transparent;
  }
  header{
    position:sticky; top:0; z-index:50;
    background:linear-gradient(180deg,#12151b,#0f1115);
    border-bottom:1px solid var(--border);
    padding:14px 16px 10px;
  }
  header h1{
    font-size:17px; margin:0 0 2px; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  header h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  header p{margin:0;font-size:12px;color:var(--sub);}

  nav{
    display:flex; gap:6px; padding:10px 16px 0;
    background:#0f1115;
  }
  nav button{
    flex:1; padding:10px 6px; border-radius:10px 10px 0 0;
    border:1px solid var(--border); border-bottom:none;
    background:var(--panel); color:var(--sub);
    font-size:13px; font-weight:600; cursor:pointer;
  }
  nav button.active{
    background:var(--panel2); color:var(--accent);
  }

  main{padding:14px 16px 90px; max-width:720px; margin:0 auto;}
  .card{
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:12px;
  }
  .row{display:flex; gap:8px;}
  input[type=text], select{
    width:100%; padding:11px 12px; border-radius:10px;
    border:1px solid var(--border); background:var(--panel);
    color:var(--text); font-size:14px; outline:none;
  }
  input[type=text]:focus, select:focus{border-color:var(--accent);}
  .btn{
    padding:11px 16px; border-radius:10px; border:none;
    font-weight:700; font-size:14px; cursor:pointer;
    background:var(--accent); color:#0b1410;
  }
  .btn:active{transform:scale(.97);}
  .btn.secondary{background:var(--panel); color:var(--text); border:1px solid var(--border);}
  .btn.danger{background:var(--danger); color:#210506;}
  .btn.block{width:100%;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .filters{display:flex; gap:8px; margin-top:8px; overflow-x:auto; padding-bottom:2px;}
  .chip{
    flex:0 0 auto; padding:6px 12px; border-radius:999px;
    border:1px solid var(--border); background:var(--panel);
    color:var(--sub); font-size:12px; white-space:nowrap; cursor:pointer;
  }
  .chip.active{background:var(--accent); color:#0b1410; border-color:var(--accent); font-weight:700;}

  .plist{margin-top:10px; display:flex; flex-direction:column; gap:8px;}
  .pitem{
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:10px 12px;
    display:flex; align-items:center; gap:10px; cursor:pointer;
  }
  .pitem:active{background:#20242e;}
  .pitem .info{flex:1; min-width:0;}
  .pitem .name{font-size:13.5px; font-weight:600; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .pitem .meta{font-size:11.5px; color:var(--sub); margin-top:3px;}
  .pitem .code{font-size:11px; color:var(--accent); font-family:monospace;}
  .pitem input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent);flex:0 0 auto;}
  .badge{
    font-size:10.5px; padding:2px 7px; border-radius:6px;
    background:#26304a; color:#8fb4ff; font-weight:600; white-space:nowrap;
  }
  .empty{text-align:center; color:var(--sub); padding:30px 10px; font-size:13px;}

  /* QR view */
  .qrbox{
    background:#fff; border-radius:14px; padding:18px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .qrbox #qrcanvas-holder{display:flex; justify-content:center;}
  .qrbox .qname{color:#111; font-weight:700; font-size:14px; text-align:center;}
  .qrbox .qcode{color:#555; font-size:12px; font-family:monospace;}
  .qrbox .qmeta{color:#777; font-size:11px;}
  .actionrow{display:flex; gap:8px; margin-top:12px;}

  /* Scanner */
  #reader{border-radius:14px; overflow:hidden; border:1px solid var(--border);}
  .scan-result{
    border-radius:14px; padding:16px; margin-top:12px;
    border:1px solid var(--accent); background:#0f2a20;
  }
  .scan-result.notfound{border-color:var(--danger); background:#2a1414;}
  .scan-result h3{margin:0 0 6px; font-size:15px;}
  .scan-result .r-code{font-family:monospace; color:var(--accent); font-size:12px;}
  .history-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 0; border-bottom:1px solid var(--border); font-size:12.5px;
  }
  .history-item:last-child{border-bottom:none;}
  .history-item .t{color:var(--sub); font-size:11px;}

  .manual-row{display:flex; gap:8px; margin-top:10px;}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:#20242e; border:1px solid var(--border); color:var(--text);
    padding:10px 18px; border-radius:999px; font-size:13px; z-index:200;
    box-shadow:0 6px 20px rgba(0,0,0,.4); opacity:0; transition:opacity .25s, transform .25s;
    pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  .stat-row{display:flex; gap:8px; margin-bottom:10px;}
  .stat{
    flex:1; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:10px; text-align:center;
  }
  .stat .num{font-size:18px; font-weight:800; color:var(--accent);}
  .stat .lbl{font-size:10.5px; color:var(--sub); margin-top:2px;}

  h2.section{font-size:13px; color:var(--sub); margin:4px 0 8px; text-transform:uppercase; letter-spacing:.5px;}

  @media print{
    body *{visibility:hidden;}
    #printSheet, #printSheet *{visibility:visible;}
    #printSheet{
      position:absolute; left:0; top:0; width:100%;
      display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    }
    .label{
      border:1px dashed #999; border-radius:8px; padding:8px;
      display:flex; flex-direction:column; align-items:center;
      break-inside:avoid; page-break-inside:avoid;
    }
    .label .lname{font-size:10px; text-align:center; margin-top:4px; color:#000; font-weight:600;}
    .label .lcode{font-size:9px; color:#333; font-family:monospace;}
  }
  #printSheet{display:none;}
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span>QR Stock POP/POS</h1>
  <p>อีเว้นท์ราชบุรี · จัดการสินค้า/อุปกรณ์ด้วย QR Code</p>
</header>

<nav>
  <button class="tab-btn active" data-tab="list">📋 รายการ</button>
  <button class="tab-btn" data-tab="generate">🔳 สร้าง QR</button>
  <button class="tab-btn" data-tab="scan">📷 สแกน</button>
  <button class="tab-btn" data-tab="history">🕘 ประวัติ</button>
</nav>

<main>

  <!-- TAB: LIST -->
  <section id="tab-list">
    <div class="stat-row">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">รายการทั้งหมด</div></div>
      <div class="stat"><div class="num" id="statSelected">0</div><div class="lbl">เลือกไว้</div></div>
      <div class="stat"><div class="num" id="statQty">0</div><div class="lbl">คงเหลือรวม</div></div>
    </div>
    <div class="card">
      <input type="text" id="searchBox" placeholder="ค้นหาชื่อสินค้า / รหัส / Brand...">
      <div class="filters" id="brandFilters"></div>
      <div class="row" style="margin-top:10px;">
        <button class="btn secondary" id="selectAllBtn" style="flex:1;">เลือกทั้งหมดที่กรอง</button>
        <button class="btn secondary" id="clearSelBtn" style="flex:1;">ล้างการเลือก</button>
      </div>
      <button class="btn block" id="goPrintBtn" style="margin-top:8px;" disabled>🖨️ พิมพ์ QR ที่เลือก (0)</button>
    </div>
    <div class="plist" id="plist"></div>
  </section>

  <!-- TAB: GENERATE -->
  <section id="tab-generate" style="display:none;">
    <div class="card">
      <input type="text" id="genSearch" placeholder="ค้นหาสินค้าเพื่อสร้าง QR...">
      <div class="plist" id="genList" style="max-height:280px; overflow-y:auto;"></div>
    </div>
    <div class="card" id="qrCard" style="display:none;">
      <div class="qrbox">
        <div id="qrcanvas-holder"></div>
        <div class="qname" id="qName"></div>
        <div class="qcode" id="qCode"></div>
        <div class="qmeta" id="qMeta"></div>
      </div>
      <div class="actionrow">
        <button class="btn secondary" style="flex:1;" id="downloadQrBtn">⬇️ ดาวน์โหลด PNG</button>
        <button class="btn secondary" style="flex:1;" id="printOneBtn">🖨️ พิมพ์</button>
      </div>
    </div>
  </section>

  <!-- TAB: SCAN -->
  <section id="tab-scan" style="display:none;">
    <div class="card">
      <div id="reader" style="width:100%;"></div>
      <div class="row" style="margin-top:10px;">
        <button class="btn block" id="startScanBtn">▶️ เปิดกล้องสแกน</button>
        <button class="btn secondary block" id="stopScanBtn" style="display:none;">⏹️ หยุดสแกน</button>
      </div>
      <div class="manual-row">
        <input type="text" id="manualCode" placeholder="หรือพิมพ์รหัสสินค้าเอง...">
        <button class="btn secondary" id="manualBtn">ค้นหา</button>
      </div>
    </div>
    <div id="scanResultWrap"></div>
  </section>

  <!-- TAB: HISTORY -->
  <section id="tab-history" style="display:none;">
    <div class="card">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <h2 class="section" style="margin:0;">ประวัติการสแกน</h2>
        <button class="btn danger" id="clearHistBtn" style="padding:6px 12px; font-size:12px;">ล้างประวัติ</button>
      </div>
      <div id="histList"></div>
    </div>
  </section>

</main>

<div id="printSheet"></div>
<div class="toast" id="toast"></div>

KV", "channel": "OT", "price": "", "qty": 1}, {"code": "R7N000091", "name": "LED FLEX KULOV VALENTINE - KV", "unit": "ป้าย", "brand": "KV", "channel": "OT", "price": "", "qty": 1}, {"code": "R7N000093", "name": "แท่นวาง Box Game Phraya -PHY", "unit": "ตัว", "brand": "PHY", "channel": "OT", "price": "", "qty": 2}, {"code": "R7N000097", "name": "Archway วงแหวน - SS", "unit": "ตัว", "brand": "SS", "channel": "EV", "price": "", "qty": 1}, {"code": "R7N000098", "name": "Infinty mirror - SS", "unit": "ตัว", "brand": "SS", "channel": "EV", "price": "", "qty": 1}, {"code": "230019569", "name": "คูปองสีทอง รวงข้าว 6x6cm-RK", "unit": "ชุด", "brand": "RK", "channel": "TT", "price": "", "qty": 0}]</script>

<script>
(function(){
  const PRODUCTS = JSON.parse(document.getElementById('products-data').textContent);
  const byCode = {};
  PRODUCTS.forEach(p => { byCode[p.code] = p; });

  let selected = new Set();
  let currentFilter = '';
  let currentBrand = 'all';

  const toast = document.getElementById('toast');
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove('show'), 1800);
  }

  // ---------- TABS ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const sections = {
    list: document.getElementById('tab-list'),
    generate: document.getElementById('tab-generate'),
    scan: document.getElementById('tab-scan'),
    history: document.getElementById('tab-history'),
  };
  tabBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      tabBtns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      Object.entries(sections).forEach(([k,el])=> el.style.display = (k===btn.dataset.tab? '' : 'none'));
      if(btn.dataset.tab === 'history') renderHistory();
      if(btn.dataset.tab !== 'scan') stopScanner();
    });
  });

  // ---------- BRAND FILTERS ----------
  const brands = Array.from(new Set(PRODUCTS.map(p=>p.brand).filter(Boolean))).sort();
  const brandFilterEl = document.getElementById('brandFilters');
  function renderBrandChips(){
    let html = `<div class="chip active" data-b="all">ทั้งหมด</div>`;
    brands.forEach(b=> html += `<div class="chip" data-b="${b}">${b}</div>`);
    brandFilterEl.innerHTML = html;
    brandFilterEl.querySelectorAll('.chip').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        brandFilterEl.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        currentBrand = chip.dataset.b;
        renderList();
      });
    });
  }
  renderBrandChips();

  function fmtPrice(p){ return p ? p+' บาท' : '-'; }

  function filteredProducts(query){
    const q = (query||'').trim().toLowerCase();
    return PRODUCTS.filter(p=>{
      if(currentBrand!=='all' && p.brand !== currentBrand) return false;
      if(!q) return true;
      return p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q);
    });
  }

  // ---------- LIST TAB ----------
  const plist = document.getElementById('plist');
  const searchBox = document.getElementById('searchBox');
  const statTotal = document.getElementById('statTotal');
  const statSelected = document.getElementById('statSelected');
  const statQty = document.getElementById('statQty');
  const goPrintBtn = document.getElementById('goPrintBtn');

  function renderList(){
    const items = filteredProducts(searchBox.value);
    statTotal.textContent = items.length;
    statQty.textContent = items.reduce((s,p)=>s+(Number(p.qty)||0),0);
    statSelected.textContent = selected.size;
    goPrintBtn.textContent = `🖨️ พิมพ์ QR ที่เลือก (${selected.size})`;
    goPrintBtn.disabled = selected.size === 0;

    if(items.length === 0){
      plist.innerHTML = `<div class="empty">ไม่พบสินค้าที่ตรงกับคำค้นหา</div>`;
      return;
    }
    plist.innerHTML = items.map(p=>`
      <div class="pitem" data-code="${p.code}">
        <input type="checkbox" ${selected.has(p.code)?'checked':''} data-check="${p.code}">
        <div class="info">
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="meta"><span class="code">${p.code}</span> · ${p.unit||''} · คงเหลือ ${p.qty}</div>
        </div>
        <span class="badge">${p.brand||'-'}</span>
      </div>
    `).join('');

    plist.querySelectorAll('[data-check]').forEach(cb=>{
      cb.addEventListener('click', e=>{
        e.stopPropagation();
        const code = cb.dataset.check;
        if(cb.checked) selected.add(code); else selected.delete(code);
        renderList();
      });
    });
    plist.querySelectorAll('.pitem').forEach(el=>{
      el.addEventListener('click', ()=>{
        const code = el.dataset.code;
        openGenerateFor(code);
        document.querySelector('.tab-btn[data-tab="generate"]').click();
      });
    });
  }

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  searchBox.addEventListener('input', renderList);

  document.getElementById('selectAllBtn').addEventListener('click', ()=>{
    filteredProducts(searchBox.value).forEach(p=>selected.add(p.code));
    renderList();
  });
  document.getElementById('clearSelBtn').addEventListener('click', ()=>{
    selected.clear();
    renderList();
  });

  goPrintBtn.addEventListener('click', ()=>{
    printSelected(Array.from(selected).map(c=>byCode[c]).filter(Boolean));
  });

  // ---------- GENERATE TAB ----------
  const genSearch = document.getElementById('genSearch');
  const genList = document.getElementById('genList');
  const qrCard = document.getElementById('qrCard');
  const qName = document.getElementById('qName');
  const qCode = document.getElementById('qCode');
  const qMeta = document.getElementById('qMeta');
  const qrHolder = document.getElementById('qrcanvas-holder');
  let currentQrProduct = null;

  function renderGenList(){
    const items = filteredProducts(genSearch.value).slice(0, 40);
    genList.innerHTML = items.map(p=>`
      <div class="pitem" data-code="${p.code}">
        <div class="info">
          <div class="name">${escapeHtml(p.name)}</div>
          <div class="meta"><span class="code">${p.code}</span> · ${p.unit||''}</div>
        </div>
        <span class="badge">${p.brand||'-'}</span>
      </div>
    `).join('') || `<div class="empty">ไม่พบสินค้า</div>`;
    genList.querySelectorAll('.pitem').forEach(el=>{
      el.addEventListener('click', ()=> openGenerateFor(el.dataset.code));
    });
  }
  genSearch.addEventListener('input', renderGenList);
  renderGenList();

  function openGenerateFor(code){
    const p = byCode[code];
    if(!p) return;
    currentQrProduct = p;
    qrCard.style.display = '';
    qName.textContent = p.name;
    qCode.textContent = p.code;
    qMeta.textContent = `${p.brand||'-'} · ${p.unit||''} · คงเหลือ ${p.qty} · ${fmtPrice(p.price)}`;
    qrHolder.innerHTML = '';
    new QRCode(qrHolder, { text: p.code, width: 200, height: 200, colorDark:'#000', colorLight:'#fff' });
    qrCard.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  document.getElementById('downloadQrBtn').addEventListener('click', ()=>{
    if(!currentQrProduct) return;
    const canvas = qrHolder.querySelector('canvas');
    if(!canvas) return;
    const link = document.createElement('a');
    link.download = `QR_${currentQrProduct.code}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  document.getElementById('printOneBtn').addEventListener('click', ()=>{
    if(currentQrProduct) printSelected([currentQrProduct]);
  });

  // ---------- PRINT ----------
  function printSelected(products){
    if(!products.length){ showToast('ยังไม่ได้เลือกสินค้า'); return; }
    const sheet = document.getElementById('printSheet');
    sheet.innerHTML = '';
    products.forEach(p=>{
      const cell = document.createElement('div');
      cell.className = 'label';
      const qrDiv = document.createElement('div');
      cell.appendChild(qrDiv);
      const nameDiv = document.createElement('div');
      nameDiv.className = 'lname';
      nameDiv.textContent = p.name;
      const codeDiv = document.createElement('div');
      codeDiv.className = 'lcode';
      codeDiv.textContent = p.code;
      cell.appendChild(nameDiv);
      cell.appendChild(codeDiv);
      sheet.appendChild(cell);
      new QRCode(qrDiv, { text: p.code, width: 110, height: 110, colorDark:'#000', colorLight:'#fff' });
    });
    setTimeout(()=> window.print(), 200);
  }

  // ---------- SCAN TAB ----------
  let html5QrCode = null;
  let scanning = false;
  const startScanBtn = document.getElementById('startScanBtn');
  const stopScanBtn = document.getElementById('stopScanBtn');
  const scanResultWrap = document.getElementById('scanResultWrap');

  function startScanner(){
    if(scanning) return;
    html5QrCode = new Html5Qrcode('reader');
    const config = { fps: 10, qrbox: { width: 240, height: 240 } };
    html5QrCode.start(
      { facingMode: 'environment' },
      config,
      onScanSuccess,
      ()=>{}
    ).then(()=>{
      scanning = true;
      startScanBtn.style.display = 'none';
      stopScanBtn.style.display = '';
    }).catch(err=>{
      showToast('เปิดกล้องไม่ได้ กรุณาอนุญาตการใช้กล้อง');
      console.error(err);
    });
  }

  function stopScanner(){
    if(html5QrCode && scanning){
      html5QrCode.stop().then(()=>{
        html5QrCode.clear();
        scanning = false;
        startScanBtn.style.display = '';
        stopScanBtn.style.display = 'none';
      }).catch(()=>{});
    }
  }

  let lastScanTime = 0;
  function onScanSuccess(decodedText){
    const now = Date.now();
    if(now - lastScanTime < 1500) return; // debounce duplicate reads
    lastScanTime = now;
    handleCode(decodedText.trim());
    if(navigator.vibrate) navigator.vibrate(80);
  }

  startScanBtn.addEventListener('click', startScanner);
  stopScanBtn.addEventListener('click', stopScanner);

  document.getElementById('manualBtn').addEventListener('click', ()=>{
    const val = document.getElementById('manualCode').value.trim();
    if(val) handleCode(val);
  });
  document.getElementById('manualCode').addEventListener('keydown', e=>{
    if(e.key === 'Enter'){
      const val = e.target.value.trim();
      if(val) handleCode(val);
    }
  });

  function handleCode(code){
    const p = byCode[code];
    addHistory(code, !!p);
    if(p){
      scanResultWrap.innerHTML = `
        <div class="scan-result">
          <h3>✅ ${escapeHtml(p.name)}</h3>
          <div class="r-code">${p.code}</div>
          <div style="margin-top:8px; font-size:13px; color:#cfe;">
            Brand: ${p.brand||'-'} · หน่วย: ${p.unit||'-'}<br>
            คงเหลือ: ${p.qty} · ราคา: ${fmtPrice(p.price)}<br>
            ช่องทาง: ${p.channel||'-'}
          </div>
        </div>`;
    } else {
      scanResultWrap.innerHTML = `
        <div class="scan-result notfound">
          <h3>❌ ไม่พบสินค้า</h3>
          <div class="r-code">${escapeHtml(code)}</div>
          <div style="margin-top:8px; font-size:13px; color:#fbb;">รหัสนี้ไม่มีอยู่ในฐานข้อมูลสินค้า</div>
        </div>`;
    }
  }

  // ---------- HISTORY (localStorage) ----------
  const HIST_KEY = 'qr_scan_history_v1';
  function getHistory(){
    try{ return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }catch(e){ return []; }
  }
  function addHistory(code, found){
    const hist = getHistory();
    const p = byCode[code];
    hist.unshift({
      code, found,
      name: p ? p.name : null,
      time: new Date().toISOString()
    });
    localStorage.setItem(HIST_KEY, JSON.stringify(hist.slice(0,200)));
  }
  function renderHistory(){
    const hist = getHistory();
    const histList = document.getElementById('histList');
    if(!hist.length){
      histList.innerHTML = `<div class="empty">ยังไม่มีประวัติการสแกน</div>`;
      return;
    }
    histList.innerHTML = hist.map(h=>{
      const d = new Date(h.time);
      const timeStr = d.toLocaleString('th-TH', {dateStyle:'short', timeStyle:'short'});
      return `<div class="history-item">
        <div>
          <div>${h.found ? '✅ ' : '❌ '}${escapeHtml(h.name || h.code)}</div>
          <div class="t">${h.code} · ${timeStr}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('clearHistBtn').addEventListener('click', ()=>{
    if(confirm('ล้างประวัติการสแกนทั้งหมด?')){
      localStorage.removeItem(HIST_KEY);
      renderHistory();
      showToast('ล้างประวัติแล้ว');
    }
  });

  // ---------- INIT ----------
  renderList();
})();
</script>
</body>
</html>
